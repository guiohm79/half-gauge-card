<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Arc de jauge demi-circulaire (fond) -->
  <path d="M4 18 A8 8 0 0 1 20 18" stroke="#555" stroke-width="2"/>
  
  <!-- LEDs actives sur l'arc (partie colorée) -->
  <path d="M4 18 A8 8 0 0 1 12 10" stroke="url(#gaugeGradient)" stroke-width="2" stroke-dasharray="2 1"/>
  
  <!-- Centre de la jauge -->
  <circle cx="12" cy="18" r="2.5" fill="#444" stroke="#666"/>
  
  <!-- Aiguille -->
  <line x1="12" y1="18" x2="16" y2="12" stroke="#fff" stroke-width="1.5"/>
  
  <!-- Point central -->
  <circle cx="12" cy="18" r="1" fill="#fff"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="gaugeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="50%" stop-color="#ffeb3b"/>
      <stop offset="100%" stop-color="#f44336"/>
    </linearGradient>
  </defs>
</svg>
