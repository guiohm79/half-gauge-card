# Exemple complet Half Gauge Card
# Toutes les options disponibles

type: custom:half-gauge-card

# === ENTITÉ ET DONNÉES ===
entity: sensor.humidite_salon
name: Humidité Salon
unit: '%'
min: 0
max: 100
decimals: 0

# === APPARENCE DE LA JAUGE ===
gauge_size: 200          # Taille de la jauge en pixels (défaut: 200)
leds_count: 50           # Nombre de LEDs (défaut: 50)
led_size: 10             # Taille des LEDs en pixels (défaut: 10)

# === COULEURS ===
# Couleurs de fond
card_background: '#222'  # Fond de la carte (défaut: #222)
gauge_background: 'radial-gradient(circle at center, #444, #222)'  # Fond de la jauge

# Couleurs du texte
text_color: '#fff'       # Couleur de la valeur (défaut: #fff)
unit_color: '#ddd'       # Couleur de l'unité (défaut: #ddd)
title_color: '#fff'      # Couleur du titre (défaut: #fff)

# === SEUILS DE COULEUR (SEVERITY) ===
# Définit les couleurs selon la valeur
severity:
  - color: '#00bfff'     # Bleu - très bas
    value: 20
  - color: '#4caf50'     # Vert - normal
    value: 40
  - color: '#ff9800'     # Orange - élevé
    value: 60
  - color: '#f44336'     # Rouge - très élevé
    value: 80

# === EFFETS VISUELS ===
enable_shadow: true      # Ombre colorée autour de la carte (défaut: false)
center_shadow: true      # Ombre colorée au centre (défaut: false)
center_shadow_blur: 35   # Flou de l'ombre centrale (défaut: 35)
center_shadow_spread: 20       # Étendue de l'ombre (défaut: 20)
center_shadow_size: 70          # Taille de l'ombre (% du rayon, défaut: 70)
value_position: 'below'         # 'below' = sous la jauge, 'inside' = dans la jauge

# === TRANSPARENCE ===
transparent_card: false   # Fond de carte transparent
transparent_gauge: false  # Fond de jauge transparent

# === COMPORTEMENT ===
smooth_transitions: true   # Animation fluide (défaut: true)
animation_duration: 800    # Durée animation en ms (défaut: 800)
hide_inactive_leds: false  # Cacher LEDs éteintes (défaut: false)

---

# === EXEMPLE MINIMAL ===
type: custom:half-gauge-card
entity: sensor.temperature
name: Température

---

# === EXEMPLE AVEC SEVERITY PERSONNALISÉ ===
type: custom:half-gauge-card
entity: sensor.batterie
gauge_size: 180
leds_count: 40
name: Batterie
unit: '%'
min: 0
max: 100
severity:
  - color: '#f44336'     # Rouge < 20%
    value: 20
  - color: '#ffeb3b'     # Jaune < 50%
    value: 50
  - color: '#4caf50'     # Vert > 50%
    value: 100
enable_shadow: true
center_shadow: true

---

# === EXEMPLE THÈME SOMBRE ÉLÉGANT ===
type: custom:half-gauge-card
entity: sensor.co2
name: CO2
unit: ppm
min: 400
max: 2000
gauge_size: 220
leds_count: 60
led_size: 8
card_background: '#1a1a2e'
text_color: '#eee'
unit_color: '#aaa'
title_color: '#fff'
severity:
  - color: '#4caf50'     # Bon < 800
    value: 20
  - color: '#ffeb3b'     # Moyen < 1200
    value: 50
  - color: '#ff9800'     # Élevé < 1600
    value: 75
  - color: '#f44336'     # Dangereux > 1600
    value: 100
enable_shadow: true
center_shadow: true
center_shadow_blur: 40
center_shadow_spread: 25

---

# === EXEMPLE COMPACT ===
type: custom:half-gauge-card
entity: sensor.cpu_usage
name: CPU
gauge_size: 150
leds_count: 30
led_size: 8
min: 0
max: 100
unit: '%'
hide_inactive_leds: true
severity:
  - color: '#4caf50'
    value: 50
  - color: '#f44336'
    value: 100

---

# === EXEMPLE AVEC FOND TRANSPARENT ===
type: custom:half-gauge-card
entity: sensor.luminosity
name: Luminosité
unit: lux
gauge_size: 180
min: 0
max: 1000
value_position: 'inside'
transparent_card: true
transparent_gauge: true
center_shadow: true
severity:
  - color: '#ffeb3b'
    value: 100
  - color: '#ff9800'
    value: 500
  - color: '#f44336'
    value: 1000

---

# === EXEMPLE AVEC VALEUR À L'INTÉRIEUR ===
type: custom:half-gauge-card
entity: sensor.temperature
name: Température
gauge_size: 200
leds_count: 50
min: -10
max: 40
unit: '°C'
decimals: 1
value_position: 'inside'  # La valeur est affichée dans le demi-cercle
center_shadow: true
center_shadow_blur: 40
center_shadow_spread: 25
severity:
  - color: '#00bfff'
    value: 0
  - color: '#4caf50'
    value: 33
  - color: '#ff9800'
    value: 66
  - color: '#f44336'
    value: 100
